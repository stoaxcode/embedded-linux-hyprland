
background {
    monitor =
    path = ~/Pictures/Wallpapers/wall1.png
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME

label {
    monitor =
    text = cmd[update:1000] date +%H:%M
    color = rgba(0, 255, 255, 1.0)
    font_size = 80
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0, 217, 255, 0.6)
}

# DATE 

label {
    monitor =
    text = cmd[update:1000] date "+%A, %B %d"
    color = rgba(0, 217, 255, 0.7)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Medium
    position = 0, 50
    halign = center
    valign = center
}

# USER GREETING

label {
    monitor =
    text = EMBEDDED SYSTEMS WORKSTATION
    color = rgba(0, 162, 255, 0.6)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -30
    halign = center
    valign = center
}

# CIRCUIT LINE DIVIDER

label {
    monitor =
    text = ─────────────────────────────────
    color = rgba(0, 162, 255, 0.3)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, -60
    halign = center
    valign = center
}

# INPUT FIELD

input-field {
    monitor =
    size = 350, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    
    outer_color = rgba(0, 217, 255, 0.8)
    inner_color = rgba(10, 14, 20, 0.95)
    font_color = rgba(0, 255, 255, 1.0)
    check_color = rgba(0, 217, 255, 1.0)
    fail_color = rgba(255, 68, 68, 1.0)
    
    fade_on_empty = false
    placeholder_text = Enter Password..
    hide_input = false
    rounding = 6
    
    position = 0, -120
    halign = center
    valign = center
    
    shadow_passes = 4
    shadow_size = 10
    shadow_color = rgba(0, 162, 255, 0.5)
}

# CAPS LOCK WARNING

label {
    monitor =
    text = cmd[update:1000] ~/.config/scripts/capslock.sh
    color = rgba(255, 68, 68, 1.0)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -180
    halign = center
    valign = center
}

