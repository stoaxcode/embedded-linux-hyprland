background {
    path = ~/Pictures/Wallpapers/wall1.png
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
}

# TIME
label {
    text = cmd[update:1000] date +%H:%M
    color = rgba(0, 255, 255, 1.0)
    font_size = 75
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 380
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0, 217, 255, 0.6)
}

# DATE 
label {
    text = cmd[update:1000] date "+%A, %B %d"
    color = rgba(0, 217, 255, 0.7)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Medium
    position = 0, 300
    halign = center
    valign = center
}

# GREETING 
label {
    text = Hi, StoaXCode..
    color = rgb(27, 239, 254)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -50
    halign = center
    valign = center
}

# USER ICON
image {
    path = ~/Pictures/Wallpapers/me.jpg
    size = 140
    rounding = 100
    border_size = 2
    border_color = rgba(0, 217, 255, 0.6)
    shadow_color = rgba(0, 217, 255, 0.6)
    shadow_passes = 3
    shadow_size = 6
    
    position = 0, 100
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    size = 220, 40
    outline_thickness = 2

    outer_color = rgba(0, 217, 255, 0.8)
    inner_color = rgba(10, 14, 20, 0.95)
    font_color = rgba(0, 255, 255, 1.0)
    check_color = rgba(0, 217, 255, 1.0)
    fail_color = rgba(255, 68, 68, 1.0)

    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true

    placeholder_text = password
    rounding = 6

    position = 0, -115
    halign = center
    valign = center
}

# CAPS LOCK 
label {
    text = cmd[update:1000] ~/.config/scripts/capslock.sh
    color = rgba(255, 68, 68, 1.0)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -155
    halign = center
    valign = center
}

# FOOTER
label {
    text = ESC to cancel
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, 25
    halign = center
    valign = bottom
}

# CORNER FRAME

label {
    text = ┌─
    color = rgb(0, 165, 247)
    font_size = 28
    position = 3, 3
    halign = left
    valign = top
}

label {
    text = ─┐
    color = rgb(0, 165, 247)
    font_size = 28
    position = -3, 3
    halign = right
    valign = top
}

label {
    text = └─
    color = rgb(0, 165, 247)
    font_size = 28
    position = 3, -3
    halign = left
    valign = bottom
}

label {
    text = ─┘
    color = rgb(27, 239, 254)
    font_size = 28
    position = -3, -3
    halign = right
    valign = bottom
}