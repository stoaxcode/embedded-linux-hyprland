background {
    monitor =
    path = ~/Pictures/Wallpapers/wall1.png
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME Label

label {
    monitor =
    text = cmd[update:1000] date +%H:%M
    color = rgba(0, 255, 255, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(0, 162, 255, 0.5)
}

# DATE Label

label {
    monitor =
    text = cmd[update:1000] date "+%A, %B %d"
    color = rgba(0, 217, 255, 0.8)
    font_size = 28
    font_family = JetBrainsMono Nerd Font Medium
    position = 0, 80
    halign = center
    valign = center
}

# USER Greeting
label {
    monitor =
    text = EMBEDDED SYSTEMS WORKSTATION
    color = rgba(0, 217, 255, 0.7)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -100
    halign = center
    valign = center
}

# INPUT-FIELD

input-field {
    monitor =
    size = 400, 60
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    
    outer_color = rgba(0, 162, 255, 0.8)
    inner_color = rgba(10, 14, 20, 0.9)
    font_color = rgba(0, 255, 255, 1.0)
    check_color = rgba(0, 217, 255, 1.0)
    fail_color = rgba(255, 68, 68, 1.0)
    
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = Enter Password...
    hide_input = false
    rounding = 8

    position = 0, -300
    halign = center
    valign = center
    
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 162, 255, 0.4)
}

# CAPSLOCK Indicator

label {
    monitor =
    text = cmd[update:1000] ~/.config/scripts/capslock.sh
    color = rgba(255, 68, 68, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -370
    halign = center
    valign = center
}

# POWER MENU

label {
    monitor =
    text = ESC to cancel
    color = rgba(0, 217, 255, 0.5)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = bottom
}

