
general {
    lock_cmd = pidof hyprlock || hyprlock      
    before_sleep_cmd = loginctl lock-session    
    after_sleep_cmd = hyprctl dispatch dpms on  
    ignore_dbus_inhibit = false                 
}

# IDLE LISTENERS 

listener {
    timeout = 50                            # in seconds.
    on-timeout = notify-send "You are idle Sir!" # command to run when timeout has passed.
    on-resume = notify-send "Welcome back! Sir StoaXCode"  # command to run when activity is detected after timeout has fired.
}

# Dim screen after 2.5 minutes of inactivity
listener {
    timeout = 150                              
    on-timeout = brightnessctl -s set 10%       
    on-resume = brightnessctl -r                
}

# Lock screen after 5 minutes
listener {
    timeout = 300                               
    on-timeout = loginctl lock-session         
}

# Turn off display after 5.5 minutes
listener {
    timeout = 330                              
    on-timeout = hyprctl dispatch dpms off      
    on-resume = hyprctl dispatch dpms on        
}

