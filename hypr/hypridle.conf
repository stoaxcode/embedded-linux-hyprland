# ==========
# HYPRIDLE =
# ==========

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# ================
# IDLE LISTENERS =
# ================

# Test notification after 30 seconds
listener {
    timeout = 30
    on-timeout = notify-send "Hypridle" "You are idle Sir!"
    on-resume = notify-send "Hypridle" "Welcome back! Sir StoaXCode"
}

# Dim screen after 2.5 minutes
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

# Lock screen after 5 minutes
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn off display after 5.5 minutes
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 minutes (optional)
# listener {
#     timeout = 1800
#     on-timeout = systemctl suspend
# }