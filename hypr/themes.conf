# ==================================================
# HYPRLAND THEMES & GAPS
# ==================================================

general {
    gaps_in = 4      # Space between windows (tiled)
    gaps_out = 4     # Space between windows and screen edges
    border_size = 2  # Thin borders for productivity
    layout = dwindle
    resize_on_border = false
    allow_tearing = false

    # Window border colors
    col.active_border = rgba(00d9ffee) rgba(00a2ffee) 45deg
    col.inactive_border = rgba(00d9ffee) rgba(00a2ffee) 45deg
}

decoration {
    rounding = 5         
    rounding_power = 2

    active_opacity = 3
    inactive_opacity = 3
    fullscreen_opacity = 3

    dim_inactive = false

    shadow {
        enabled = true
        range = 10
        render_power = 4
        color = rgba(00a2ff44)
        color_inactive = rgba(1a1a1a88)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.2
        new_optimizations = true
    }
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true

    vfr = true                      # Save power when idle
    focus_on_activate = false       # Prevent apps from stealing focus

    animate_manual_resizes = false
    animate_mouse_windowdragging = false

    mouse_move_focuses_monitor = false
}
