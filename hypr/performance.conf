###########################
### PERFORMANCE MODES   ###
###########################

# Performance Mode (for heavy compilation/debugging)
bind = $mainMod SHIFT, F1, submap, perf_mode

submap = perf_mode

# FOCUS MODE - Disable all eye candy for maximum performance
bind = , F, exec, \
    hyprctl keyword decoration:blur:enabled false && \
    hyprctl keyword decoration:shadow:enabled false && \
    hyprctl keyword animations:enabled false && \
    notify-send "Performance" "Focus Mode - All effects disabled"
bind = , F, submap, reset

# BATTERY MODE - Balanced for laptops
bind = , B, exec, \
    hyprctl keyword decoration:blur:enabled false && \
    hyprctl keyword decoration:shadow:enabled true && \
    hyprctl keyword animations:enabled true && \
    notify-send "Performance" "Battery Mode - Blur disabled"
bind = , B, submap, reset

# FULL RICE MODE - All effects enabled
bind = , R, exec, \
    hyprctl keyword decoration:blur:enabled true && \
    hyprctl keyword decoration:shadow:enabled true && \
    hyprctl keyword animations:enabled true && \
    notify-send "Performance" "Rice Mode - All effects enabled"
bind = , R, submap, reset

# Exit performance mode
bind = , ESCAPE, submap, reset

submap = reset