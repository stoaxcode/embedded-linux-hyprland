$mainMod = SUPER  # Windows key
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun
$scripts = ~/Repos/embedded-linux-hyprland/scripts
$datasheets = ~/Documents/datasheets

###########################
### CORE WINDOW CONTROL ###
###########################

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, SPACE, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, Z, exec, ~/.config/waybar/scripts/launch.sh

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Pin window (stays on top, visible on all workspaces)
bind = $mainMod, V, pin  # "V" for View (always visible)

# Pseudo-tile (floating window but tiled behavior)
bind = $mainMod, P, pseudo

# Center floating window
bind = $mainMod, C, centerwindow

#################
### CLIPBOARD ###
#################

bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

#############################
### WORKSPACE NAVIGATION ###
#############################

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

# Cycle workspaces (mouse scroll)
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Cycle workspaces (keyboard)
bind = $mainMod, bracketright, workspace, e+1  # Super + ]
bind = $mainMod, bracketleft, workspace, e-1   # Super + [

# Move window to next/previous workspace and follow
bind = $mainMod SHIFT, bracketright, movetoworkspace, e+1
bind = $mainMod SHIFT, bracketleft, movetoworkspace, e-1

# Jump to last used workspace
bind = $mainMod, GRAVE, workspace, previous  # Super + ` (backtick)

##################
### MOVE FOCUS ###
##################

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# VIM-style focus (H/J/K/L)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

####################
### SWAP WINDOWS ###
####################

# Swap windows (reorganize layout)
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# VIM-style swap
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, j

#####################
### RESIZE WINDOWS ###
#####################

# Resize active window
bind = $mainMod CTRL, left, resizeactive, -60 0
bind = $mainMod CTRL, right, resizeactive, 60 0
bind = $mainMod CTRL, up, resizeactive, 0 -60
bind = $mainMod CTRL, down, resizeactive, 0 60

# VIM-style resize
bind = $mainMod CTRL, H, resizeactive, -60 0
bind = $mainMod CTRL, L, resizeactive, 60 0
bind = $mainMod CTRL, K, resizeactive, 0 -60
bind = $mainMod CTRL, J, resizeactive, 0 60

############################
### MOUSE WINDOW CONTROL ###
############################

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

###########################
### ENGINEERING WORKFLOW ###
###########################

# Quick access (still available)
bind = $mainMod, B, exec, $terminal -e $scripts/build/cmake_build.sh
bind = $mainMod, S, exec, $terminal -e $scripts/serial/serial_monitor.sh
bind = $mainMod, D, exec, $fileManager $datasheets

# Engineering submap (modal mode)
bind = $mainMod, W, submap, engineering  # "W" for Workflow

submap = engineering

# Build commands
bind = , B, exec, $terminal -e $scripts/build/cmake_build.sh
bind = , B, submap, reset

bind = , C, exec, $terminal -e $scripts/build/clean_build.sh  # Clean build
bind = , C, submap, reset

# Flash commands  
bind = , F, exec, $terminal -e $scripts/flashing/flash_stm32.sh
bind = , F, submap, reset

bind = , E, exec, $terminal -e $scripts/flashing/flash_esp32.sh  # ESP32
bind = , E, submap, reset

# Serial/Debug
bind = , S, exec, $terminal -e $scripts/serial/serial_monitor.sh
bind = , S, submap, reset

bind = , M, exec, $terminal -e $scripts/plc/modbus_test.sh  # Modbus
bind = , M, submap, reset

# USB tools
bind = , U, exec, $terminal -e $scripts/system/usb_watch.sh
bind = , U, submap, reset

# Datasheets
bind = , D, exec, $fileManager $datasheets
bind = , D, submap, reset

# Exit submap
bind = , ESCAPE, submap, reset
bind = , RETURN, submap, reset

submap = reset

####################
### PLC / MODBUS ###
####################

# Modbus test tool
bind = $mainMod, P, exec, $terminal -e $scripts/plc/modbus_test.sh

#####################################
### SCRATCHPADS / SPECIAL WORKSPACE ###
#####################################

# Scratchpad terminal
bind = $mainMod, TAB, togglespecialworkspace, scratch-term
bind = $mainMod SHIFT, TAB, movetoworkspace, special:scratch-term

# Secondary scratchpad (Serial)
bind = $mainMod, ALT, togglespecialworkspace, scratch-serial
bind = $mainMod SHIFT, ALT, movetoworkspace, special:scratch-serial

######################
### MEDIA / SYSTEM ###
######################

# Volume controls
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media playback (requires playerctl)
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

# Minimal Mode
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/mode_minimal.sh

#####################
### HYPRCTL DEBUG ###
#####################

# Show active window info (useful for creating window rules)
bind = $mainMod, I, exec, notify-send "Window Info" "$(hyprctl activewindow | grep -E 'class|title')"

# Show current workspace info
bind = $mainMod SHIFT, I, exec, notify-send "Workspace" "$(hyprctl activeworkspace -j | jq -r '.id')"

# Reload Hyprland config
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Show Hyprland errors
bind = $mainMod SHIFT, E, exec, $terminal -e sh -c "hyprctl errors; read -p 'Press enter to close'"