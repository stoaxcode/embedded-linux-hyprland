###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart

# Enable permission system (optional - only if you want strict control)
# ecosystem {
#   enforce_permissions = 1
# }

###########################
### SCREENSHOT TOOLS    ###
###########################

# Allow screenshot tools (grim, grimblast, etc.)
permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(bin|local/bin)/grimblast, screencopy, allow
permission = /usr/(bin|local/bin)/slurp, screencopy, allow

# XDG Desktop Portal (for screen sharing, screenshots)
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow

###########################
### DEVELOPMENT TOOLS   ###
###########################

# VS Code (for screen sharing in calls, etc.)
permission = /usr/bin/code, screencopy, allow

# Terminal emulators (in case they need permissions)
# permission = /usr/bin/kitty, all, allow
# permission = /usr/bin/alacritty, all, allow

###########################
### EMBEDDED TOOLS      ###
###########################
# (Add these when you install the tools)

# OpenOCD (debugger)
# permission = /usr/bin/openocd, all, allow

# STM32 Tools
# permission = /usr/bin/st-flash, all, allow
# permission = /usr/bin/st-info, all, allow

# STM32CubeProgrammer (if installed)
# permission = /opt/stm32cubeprogrammer/bin/STM32CubeProgrammer, all, allow

# ESP32 Tools
# permission = /usr/bin/esptool, all, allow
# permission = /usr/bin/espflash, all, allow

###########################
### PLUGIN MANAGEMENT   ###
###########################

# Hyprpm (Hyprland plugin manager - if you use it)
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow